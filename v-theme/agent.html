<!DOCTYPE html>
<html lang="en" data-kore-theme="void" data-mode="dark">
<head>
<script src="kore-theme-engine.js"></script>
<link rel="stylesheet" href="kore-themes.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KORE — Agent Workspace</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://js.paystack.co/v1/inline.js"></script>
<style>
/* ════════════════════════════════════════
   LAYOUT & BASE
════════════════════════════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{cursor:none;display:flex;flex-direction:column;}

/* CURSOR */
.cursor{position:fixed;width:12px;height:12px;background:var(--ink);border-radius:50%;pointer-events:none;z-index:99999;mix-blend-mode:difference;transform:translate(-50%,-50%);transition:width .3s,height .3s;}
.cursor.big{width:48px;height:48px;}
@media(pointer:coarse){.cursor{display:none;}}

.app-container {
  display: flex;
  flex: 1;
  overflow: hidden;
  position: relative;
}

/* ════════════════════════════════════════
   CHAT PANEL (Dashboard Side)
════════════════════════════════════════ */
.chat-panel {
  width: 420px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: relative;
  z-index: 10;
}
@media (max-width: 900px) {
  .chat-panel { width: 100%; border-right: none; }
}

/* Chat Header */
.chat-hd {
  padding: 1.2rem 1.5rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.hd-info { display: flex; align-items: center; gap: .8rem; }
.hd-av { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); color: var(--bg); display: flex; align-items: center; justify-content: center; font-family: 'Bodoni Moda', serif; font-size: 1.2rem; position: relative;}
.hd-av-dot { position: absolute; bottom: 0; right: 0; width: 10px; height: 10px; border-radius: 50%; background: #5CB88A; border: 2px solid var(--surface); }
.hd-text h2 { font-family: 'Bodoni Moda', serif; font-size: 1.1rem; font-weight: 400; line-height: 1; margin-bottom: .2rem; }
.hd-text p { font-size: .65rem; letter-spacing: .1em; text-transform: uppercase; color: var(--accent); }
.hd-acts { display: flex; gap: .5rem; }
.icon-btn { background: none; border: none; color: var(--ink-dim); font-size: 1.1rem; cursor: pointer; padding: .4rem; transition: color .2s; }
.icon-btn:hover { color: var(--accent); }

/* Messages Area */
.msgs-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: .5rem;
}
.msgs-wrap::-webkit-scrollbar { width: 0; }

.welcome { display: flex; flex-direction: column; align-items: center; text-align: center; margin: auto 0; padding: 2rem 0; }
.welcome.gone { display: none; }
.w-glyph { font-family: 'Bodoni Moda', serif; font-size: 3rem; color: var(--border-v); margin-bottom: 1rem; }
.w-title { font-family: 'Bodoni Moda', serif; font-size: 1.4rem; font-weight: 300; margin-bottom: .5rem; }
.w-sub { font-size: .8rem; color: var(--ink-dim); line-height: 1.6; max-width: 280px; margin-bottom: 1.5rem; }

.msg-row { display: flex; flex-direction: column; max-width: 85%; margin-bottom: .5rem; }
.msg-row.ai { align-self: flex-start; }
.msg-row.user { align-self: flex-end; align-items: flex-end; }
.bubble { padding: .8rem 1rem; border-radius: 12px; font-size: .9rem; line-height: 1.6; word-break: break-word; }
.msg-row.ai .bubble { background: var(--bg); border: 1px solid var(--border); color: var(--ink); border-bottom-left-radius: 2px; }
.msg-row.user .bubble { background: var(--accent); color: var(--bg); border-bottom-right-radius: 2px; }

/* Typing Indicator */
.typing-row { display: none; align-self: flex-start; margin-bottom: .5rem; }
.typing-row.show { display: flex; }
.typing-bubble { background: var(--bg); border: 1px solid var(--border); padding: .8rem 1.2rem; border-radius: 12px 12px 12px 2px; display: flex; gap: 4px; }
.td { width: 6px; height: 6px; border-radius: 50%; background: var(--ink-dim); animation: tda 1.4s ease-in-out infinite; }
.td:nth-child(2) { animation-delay: .2s; }
.td:nth-child(3) { animation-delay: .4s; }
@keyframes tda { 0%, 60%, 100% { transform: scale(1); opacity: .4; } 30% { transform: scale(1.3); opacity: 1; } }

/* Input Area */
.input-area { padding: 1rem 1.5rem; border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
.input-wrap { display: flex; align-items: flex-end; background: var(--bg); border: 1px solid var(--border-v); border-radius: 24px; padding: .5rem .8rem; transition: border-color .3s; }
.input-wrap:focus-within { border-color: var(--accent); }
.in-box { flex: 1; background: none; border: none; color: var(--ink); font-family: 'Syne', sans-serif; font-size: .95rem; outline: none; resize: none; min-height: 24px; max-height: 120px; padding: .2rem .5rem; line-height: 1.5; }
.in-box::placeholder { color: var(--ink-dim); opacity: .6; }
.send-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: opacity .2s; }
.send-btn:hover { opacity: .8; }
.send-btn svg { width: 16px; height: 16px; fill: none; stroke: var(--bg); stroke-width: 2.5; }

/* Mobile Tabs */
.mobile-tabs { display: none; background: var(--surface); border-top: 1px solid var(--border); padding: .5rem 0; flex-shrink: 0; }
@media (max-width: 900px) { .mobile-tabs { display: flex; } }
.mob-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; background: none; border: none; color: var(--ink-dim); font-size: .55rem; letter-spacing: .1em; text-transform: uppercase; cursor: pointer; text-decoration: none; }
.mob-tab.on, .mob-tab:hover { color: var(--accent); }
.mob-tab svg { width: 20px; height: 20px; }


/* ════════════════════════════════════════
   CANVAS PANEL (Main View)
════════════════════════════════════════ */
.canvas-panel {
  flex: 1;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}
@media (max-width: 900px) {
  .canvas-panel {
    position: fixed;
    inset: 0;
    z-index: 1000;
    transform: translateY(100%);
  }
  .canvas-panel.show { transform: translateY(0); }
}

.canvas-empty { text-align: center; color: var(--ink-dim); }
.canvas-empty svg { width: 64px; height: 64px; opacity: .2; margin-bottom: 1rem; }
.canvas-empty p { font-size: .85rem; letter-spacing: .1em; text-transform: uppercase; }

.design-container {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  padding: 2rem;
  max-width: 900px;
  margin: 0 auto;
}
.mobile-close-canvas {
  display: none;
  align-self: flex-end;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--ink);
  width: 40px; height: 40px;
  border-radius: 50%;
  font-size: 1.2rem;
  cursor: pointer;
  margin-bottom: 1rem;
}
@media (max-width: 900px) {
  .mobile-close-canvas { display: flex; align-items: center; justify-content: center; }
  .design-container { padding: 1.5rem; }
}

.design-content {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 350px;
  gap: 3rem;
  align-items: center;
}
@media (max-width: 900px) {
  .design-content { grid-template-columns: 1fr; gap: 1.5rem; align-items: flex-start; overflow-y: auto; }
}

.design-image-wrap {
  width: 100%;
  aspect-ratio: 3/4;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  position: relative;
}
.design-image-wrap img { width: 100%; height: 100%; object-fit: cover; }
.design-badge { position: absolute; top: 1rem; left: 1rem; background: var(--bg); border: 1px solid var(--border-v); font-size: .6rem; letter-spacing: .2em; text-transform: uppercase; padding: .3rem .8rem; border-radius: 999px; }

.design-details { display: flex; flex-direction: column; }
.design-series { font-size: .7rem; letter-spacing: .3em; text-transform: uppercase; color: var(--accent); margin-bottom: .5rem; }
.design-title { font-family: 'Bodoni Moda', serif; font-size: clamp(2rem, 4vw, 3rem); font-weight: 300; line-height: 1.1; margin-bottom: 1rem; }
.design-desc { font-size: .9rem; color: var(--ink-dim); line-height: 1.7; margin-bottom: 2rem; }

.design-swatches { display: flex; gap: .8rem; margin-bottom: 2.5rem; }
.swatch { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform .2s; }
.swatch:hover { transform: scale(1.1); }
.swatch.active { border-color: var(--accent); }

.btn-order { background: var(--accent); color: var(--bg); border: none; padding: 1.2rem; font-family: 'Syne', sans-serif; font-size: .85rem; letter-spacing: .15em; text-transform: uppercase; cursor: pointer; border-radius: 8px; transition: opacity .2s; width: 100%; }
.btn-order:hover { opacity: .9; }


/* Paywall */
.paywall { position: fixed; inset: 0; z-index: 2000; background: rgba(8,8,10,.95); backdrop-filter: blur(12px); display: none; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
.paywall.show { display: flex; }
.pw-title { font-family: 'Bodoni Moda', serif; font-size: 2rem; font-weight: 300; margin-bottom: 1rem; }
.pw-btn { background: var(--accent); color: var(--bg); border: none; padding: 1rem 2rem; font-family: 'Syne', sans-serif; font-size: .8rem; letter-spacing: .2em; text-transform: uppercase; cursor: pointer; border-radius: 8px; }
.pw-skip { margin-top: 1rem; background: none; border: none; color: var(--ink-dim); cursor: pointer; text-decoration: underline; font-size: .8rem; }
</style>
</head>
<body>
<div class="cursor" id="cur"></div>

<div class="app-container">

  <div class="chat-panel">
    
    <div class="chat-hd">
      <div class="hd-info">
        <div class="hd-av" id="hdAv">K<div class="hd-av-dot"></div></div>
        <div class="hd-text">
          <h2 id="hdName">KORE Agent</h2>
          <p>Online</p>
        </div>
      </div>
      <div class="hd-acts">
        <button class="icon-btn" id="themeToggle" title="Toggle Theme">
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </button>
        <button class="icon-btn" onclick="newChat()" title="New Chat">
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        </button>
      </div>
    </div>

    <div class="msgs-wrap" id="msgsWrap">
      <div class="welcome" id="welcome">
        <div class="w-glyph">&#10022;</div>
        <h1 class="w-title" id="wName">Welcome</h1>
        <p class="w-sub">Your private intelligence. Ask about designs, sizing, or your orders.</p>
      </div>
      <div class="typing-row" id="typRow">
        <div class="typing-bubble"><div class="td"></div><div class="td"></div><div class="td"></div></div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea class="in-box" id="inBox" placeholder="Message Agent..." rows="1"></textarea>
        <button class="send-btn" id="sendBtn" onclick="send()">
          <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>

    <div class="mobile-tabs">
      <button class="mob-tab on">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        Chat
      </button>
      <a href="collection.html" class="mob-tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Store
      </a>
      <a href="dashboard.html" class="mob-tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 2a4 4 0 100 8 4 4 0 000-8zM4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        Me
      </a>
    </div>

  </div>

  <div class="canvas-panel" id="canvasPanel">
    <div class="canvas-empty" id="canvasEmpty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
      <p>AI Canvas Waiting</p>
    </div>
    <div class="design-container" id="designContainer" style="display:none;">
      <button class="mobile-close-canvas" onclick="closeCanvas()">&#10005;</button>
      <div class="design-content" id="designContent">
        </div>
    </div>
  </div>

</div>

<div class="paywall" id="paywall">
  <h2 class="pw-title">KORE Member Limit Reached</h2>
  <button class="pw-btn" onclick="doPay()">Upgrade Now</button>
  <button class="pw-skip" onclick="hidePaywall()">Cancel</button>
</div>

<script>
// ── Config ──
const SU = window.ENV?.SUPABASE_URL || 'YOUR_SUPABASE_URL';
const SK = window.ENV?.SUPABASE_ANON_KEY || 'YOUR_SUPABASE_ANON_KEY';
const PK = window.ENV?.PAYSTACK_PUBLIC_KEY || 'YOUR_PAYSTACK_KEY';
const sb = supabase.createClient(SU, SK);

let user=null, profile=null, msgs=[], sid='s_'+Date.now();
let subActive=false, freeCount=0, msgCount=0;
const FREE_LIMIT=5;

// ── Theme Engine Integration ──
document.getElementById('themeToggle')?.addEventListener('click', () => {
  const next = KoreTheme.get().mode === 'dark' ? 'light' : 'dark';
  KoreTheme.set('mode', next);
});

// ── Custom Cursor (Optimized via rAF) ──
const cur = document.getElementById('cur');
let mouseX=0, mouseY=0, curX=0, curY=0;
document.addEventListener('mousemove', e => { mouseX=e.clientX; mouseY=e.clientY; });
function animateCursor() {
  curX += (mouseX - curX) * 0.2;
  curY += (mouseY - curY) * 0.2;
  cur.style.transform = `translate(${curX - 6}px, ${curY - 6}px)`;
  requestAnimationFrame(animateCursor);
}
requestAnimationFrame(animateCursor);

// Attach cursor hover states thoroughly
document.addEventListener('mouseover', e => {
  if(e.target.closest('a, button, textarea, .swatch, .in-box')) cur.classList.add('big');
});
document.addEventListener('mouseout', e => {
  if(e.target.closest('a, button, textarea, .swatch, .in-box')) cur.classList.remove('big');
});

// ── Init ──
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if(!session) { location.href='login.html'; return; }
  user = session.user;

  const { data: p } = await sb.from('profiles').select('*').eq('id', user.id).single();
  profile = p;
  subActive = p?.subscription_tier !== 'free' && p?.subscription_status === 'active';
  
  if(p?.first_name) {
    document.getElementById('wName').textContent = `Hi, ${p.first_name}`;
  }
  
  // Custom Agent Name Logic
  if(p?.agent_name) {
    document.getElementById('hdName').textContent = p.agent_name;
    document.getElementById('hdAv').textContent = p.agent_name.charAt(0).toUpperCase();
  }

  if(!subActive) {
    freeCount = parseInt(localStorage.getItem('kf_'+user.id) || '0');
  }

  // Load Convo
  try {
    const { data: cv } = await sb.from('ai_conversations')
      .select('*').eq('user_id', user.id).order('updated_at', {ascending: false}).limit(1).single();
    if(cv?.messages?.length) {
      msgs = cv.messages;
      sid = cv.session_id;
      document.getElementById('welcome').classList.add('gone');
      msgs.forEach(m => renderMsg(m.role, m.content, false));
      scrollBottom();
    }
  } catch(e) {}
})();

// ── UI Helpers ──
const inBox = document.getElementById('inBox');
inBox.addEventListener('input', function() {
  this.style.height = '1px'; // Reset to calculate true scrollHeight
  this.style.height = Math.max(24, Math.min(this.scrollHeight, 120)) + 'px';
});
inBox.addEventListener('keydown', e => {
  if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

function scrollBottom() {
  const w = document.getElementById('msgsWrap');
  setTimeout(() => w.scrollTop = w.scrollHeight, 40);
}
function setTyping(show) {
  document.getElementById('typRow').classList.toggle('show', show);
  if(show) scrollBottom();
}

// ── Canvas Logic ──
function triggerCanvas(name, series, desc) {
  document.getElementById('canvasEmpty').style.display = 'none';
  const container = document.getElementById('designContainer');
  const content = document.getElementById('designContent');
  
  let imgPath = 'images/Forme 1.png';
  if (series.toLowerCase().includes('layer')) imgPath = 'images/Layer.jpg';
  if (series.toLowerCase().includes('aurel')) imgPath = 'images/Aurel.jpg';

  content.innerHTML = `
    <div class="design-image-wrap">
      <img src="${imgPath}" alt="${name}">
      <div class="design-badge">Design Studio</div>
    </div>
    <div class="design-details">
      <p class="design-series">${series}</p>
      <h2 class="design-title">${name}</h2>
      <p class="design-desc">${desc}</p>
      <div class="design-swatches">
        <div class="swatch active" style="background:#08080A;"></div>
        <div class="swatch" style="background:#F2EFE8;"></div>
        <div class="swatch" style="background:#6A6860;"></div>
      </div>
      <button class="btn-order" onclick="location.href='checkout.html?product=${encodeURIComponent(name)}&series=${encodeURIComponent(series)}'">Configure & Order</button>
    </div>
  `;
  container.style.display = 'flex';
  document.getElementById('canvasPanel').classList.add('show'); // mobile slide up
}

function closeCanvas() {
  document.getElementById('canvasPanel').classList.remove('show');
}

// ── Chat Logic ──
function getSysPrompt() {
  const fit = profile?.fit_chest ? `Chest ${profile.fit_chest}cm` : 'No measurements';
  const agentName = profile?.agent_name || 'KORE';
  
  return `You are ${agentName}, personal AI for a luxury casualwear brand. Respond concisely under 100 words. User Fit: ${fit}. 
  If you discuss a product, end your reply with exactly: [PRODUCT:Name|Series|Description]. 
  Example: [PRODUCT:Cotton Shirt I|FORME|Architectural fit cotton shirt]`;
}

function renderMsg(role, content, animate=true) {
  const wrap = document.getElementById('msgsWrap');
  const typ = document.getElementById('typRow');
  const isUser = role === 'user';
  
  let cleanContent = content.replace(/\[PRODUCT:.*?\]/g, '').trim();
  cleanContent = cleanContent.replace(/\n/g, '<br>');

  const row = document.createElement('div');
  row.className = `msg-row ${isUser ? 'user' : 'ai'}`;
  row.innerHTML = `<div class="bubble">${cleanContent}</div>`;
  wrap.insertBefore(row, typ);
}

async function send() {
  const text = inBox.value.trim();
  if(!text) return;

  if(!subActive && freeCount >= FREE_LIMIT) {
    document.getElementById('paywall').classList.add('show');
    return;
  }
  if(!subActive) {
    freeCount++;
    localStorage.setItem('kf_'+user.id, freeCount);
  }

  inBox.value = ''; inBox.style.height = '24px';
  document.getElementById('welcome').classList.add('gone');

  const uMsg = { role: 'user', content: text };
  msgs.push(uMsg);
  renderMsg('user', text);
  scrollBottom();
  setTyping(true);

  try {
    const apiMsgs = msgs.map(m => ({ role: m.role, content: m.content }));
    const res = await fetch(SU+'/functions/v1/claude-proxy', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-3-sonnet-20240229',
        system: getSysPrompt(),
        messages: apiMsgs,
        max_tokens: 800
      })
    });

    if (!res.ok) throw new Error('API Error');
    const data = await res.json();
    let reply = data.content?.[0]?.text || 'Error generating response.';

    // Check for canvas trigger
    const prodMatch = reply.match(/\[PRODUCT:([^|]+)\|([^|]+)\|([^\]]+)\]/);
    if(prodMatch) {
      triggerCanvas(prodMatch[1].trim(), prodMatch[2].trim(), prodMatch[3].trim());
    }

    const aMsg = { role: 'assistant', content: reply };
    msgs.push(aMsg);
    setTyping(false);
    renderMsg('assistant', reply);
    scrollBottom();

    // Safe DB Upsert
    await sb.from('ai_conversations').upsert({
      session_id: sid,
      user_id: user.id,
      messages: msgs,
      updated_at: new Date().toISOString()
    }, { onConflict: 'session_id' });

  } catch(err) {
    setTyping(false);
    renderMsg('assistant', 'Connection error. Please try again.');
  }
}

function newChat() {
  msgs = [];
  sid = 's_' + Date.now();
  document.querySelectorAll('.msg-row').forEach(e => e.remove());
  document.getElementById('welcome').classList.remove('gone');
  document.getElementById('canvasEmpty').style.display = 'block';
  document.getElementById('designContainer').style.display = 'none';
  closeCanvas();
}

// ── Paywall ──
function hidePaywall() { document.getElementById('paywall').classList.remove('show'); }
function doPay() {
  // SECURITY CRITICAL NOTE:
  // In a real production app, never update subscription tier directly from the frontend JS callback.
  // The Paystack webhook MUST handle the DB update.
  PaystackPop.setup({
    key: PK,
    email: user.email,
    amount: 7000 * 100, // Hardcoded for prototype
    currency: 'NGN',
    callback: async (r) => {
      // PROTOTYPE ONLY:
      await sb.from('profiles').update({
        subscription_tier: 'member',
        subscription_status: 'active'
      }).eq('id', user.id);
      subActive = true;
      hidePaywall();
      renderMsg('assistant', 'Welcome to KORE Member. Unlimited access is now active.');
    }
  }).openIframe();
}

// Auto-save logic for mobile tab navigation
document.querySelectorAll('.mob-tab[href]').forEach(tab => {
  tab.addEventListener('click', async (e) => {
    e.preventDefault();
    const target = e.currentTarget.getAttribute('href');
    if(msgs.length > 0) {
      await sb.from('ai_conversations').upsert({ session_id: sid, user_id: user.id, messages: msgs, updated_at: new Date().toISOString() }, { onConflict: 'session_id' });
    }
    window.location.href = target;
  });
});
</script>
